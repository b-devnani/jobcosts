# Render Blueprint — deploy the Job Cost Projection tool for FREE.
# Docs: https://render.com/docs/blueprint-spec
#
# In the Render dashboard: New → Blueprint → connect this repo. Render reads
# this file and provisions the free web service below.
#
# Free tier notes:
#  - No persistent disk: the SQLite database is ephemeral, so the project
#    dropdown re-seeds from backend/seed/projects_seed.csv on every restart and
#    admin edits made in the Admin tab are NOT kept. This is fine if you rely on
#    the seeded projects and type any one-off dates in the Generate form (which
#    does not require saving a project).
#  - Free instances sleep after ~15 min idle and cold-start (~30-60s) on the
#    next request.
#
# ---- To make admin edits persist (paid: starter+) ----
# Change `plan: free` to `plan: starter`, add `JOBCOSTS_DB=/data/jobcosts.db`
# to envVars, and add this block under the service:
#   disk:
#     name: jobcosts-data
#     mountPath: /data
#     sizeGB: 1

services:
  - type: web
    name: jobcosts
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # Render generates a strong admin password; read it in the dashboard
      # (Environment tab) after the first deploy.
      - key: ADMIN_PASSWORD
        generateValue: true
