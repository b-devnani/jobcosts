<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Cost Projection Tool</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">▦</span>
      <div>
        <h1>Job Cost Projection</h1>
        <p class="subtitle">Upload a budget-detail CSV &rarr; download a filled-in workbook</p>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab active" data-tab="generate">Generate</button>
      <button class="tab" data-tab="admin">Admin</button>
    </nav>
  </header>

  <main>
    <!-- ===================== GENERATE ===================== -->
    <section id="generate" class="panel active">
      <div class="card simple">
        <div class="field">
          <label for="project-select">Project</label>
          <select id="project-select">
            <option value="">— Manual entry (no saved project) —</option>
          </select>
        </div>
        <input type="file" id="csv-input" accept=".csv,text/csv" hidden />
        <button id="upload-btn" class="primary big">Upload CSV</button>
        <p class="hint center">
          Choose a project, then pick your budget CSV — the workbook downloads
          automatically.
        </p>
        <p id="generate-status" class="status center"></p>
      </div>
    </section>

    <!-- ===================== ADMIN ===================== -->
    <section id="admin" class="panel">
      <div id="admin-login" class="card narrow">
        <h2>Admin sign-in</h2>
        <p class="hint">Adding or editing projects requires the admin password.</p>
        <div class="field">
          <label for="admin-password">Password</label>
          <input type="password" id="admin-password" placeholder="Admin password" />
        </div>
        <button id="admin-login-btn" class="primary">Sign in</button>
        <span id="admin-login-status" class="status"></span>
      </div>

      <div id="admin-grid" class="card hidden">
        <div class="card-head">
          <h2>Projects</h2>
          <div>
            <button id="add-row-btn" class="secondary">+ Add project</button>
            <button id="admin-signout-btn" class="ghost">Sign out</button>
          </div>
        </div>
        <div class="table-wrap">
          <table id="projects-table">
            <thead>
              <tr id="projects-head"></tr>
            </thead>
            <tbody id="projects-body"></tbody>
          </table>
        </div>
        <span id="admin-grid-status" class="status"></span>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
